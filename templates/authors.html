{% extends 'base.html' %}
{% block _header %}
    <table class="table table-light text-center">
        <tbody>
            <tr>
                <td>
                    <a href="/">Главная</a>
                </td>
                <td>
                    <a href="/poem/create">Сочинить</a>
                </td>
            </tr>
        </tbody>
    </table>
{% endblock %}
{% block _body %}
    {% for user in users %}
        <div class="card">
            <div class="card-header">
                <h3>{{user.login}}</h3>
            </div>
            <div class="card-body">
                <h5 class="card-text">{{user.description}}</h5>
                <small class="card-title"><span class="text-secondary">{{user.email}}</span></small>
            </div>
            <div class="card-footer">
                <button class="btn btn-info" onclick="location.href='/authors/{{user.id}}'">Профиль</button>
            </div>
        </div>
        <br/>
    {% endfor %}
{% endblock %}
